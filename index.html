<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav>
  <h2 class="logo">CarHub</h2>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#cars">Cars</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>Find Your Dream Car</h1>
  <p>Best cars with best prices</p>
  <button>Explore Cars</button>
</section>

<!-- Cars Section -->
<section id="cars">
  <h2>Popular Cars</h2>

  <div class="car-container">

    <div class="car">
      <img src="BMW.jpg" />
      <h3>BMW</h3>
      <p>Luxury and performance</p>
    </div>

    <div class="car">
      <img src="AUDI-R8.jpg" />
      <h3>Audi-R8</h3>
      <p>Modern design and comfort</p>
    </div>

    <div class="car">
      <img src="Mercedes AMG.webp" />
      <h3>Mercedes</h3>
      <p>Premium quality cars</p>
    </div>

  </div>
</section>

<!-- Contact -->
<section id="contact">
  <h2>Contact Us</h2>
  <button onclick="contact()">Call Now</button>
</section>

<script src="script.js"></script>
</body>
</html>
